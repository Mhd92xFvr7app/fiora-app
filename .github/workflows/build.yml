name: Build APK
on:
  push:
    branches: [ main ]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install Cordova
        run: npm install -g cordova
      - name: Install Java
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Create Cordova project
        run: |
          cordova create app com.fiora.app فيورا
          cp فيورا-fixed.html app/www/فيورا-fixed.html
          cp config.xml app/config.xml
          cp logo_512x512.png app/logo_512x512.png
          rm app/www/index.html
      - name: Add Android platform
        working-directory: app
        run: cordova platform add android
      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore fiora.keystore -alias fiora -keyalg RSA -keysize 2048 -validity 10000 -storepass fiora123456 -keypass fiora123456 -dname "CN=Fiora,OU=Fiora,O=Fiora,L=City,S=State,C=US"
          cp fiora.keystore app/fiora.keystore
      - name: Build Release APK
        working-directory: app
        run: |
          cordova build android --release -- --keystore=fiora.keystore --storePassword=fiora123456 --alias=fiora --password=fiora123456
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: fiora-release
          path: app/platforms/android/app/build/outputs/apk/release/app-release.apk
